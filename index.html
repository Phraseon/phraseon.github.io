<!DOCTYPE html>
<html lang="en">
<head>

    <title>Phraseon</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #1A1A1A;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            color: #FFFFFF;
            font-size: 3rem;

            letter-spacing: 2px;

            margin-bottom: 2rem;
        }

            color: #888888;
            font-size: 0.9rem;
        }
        a {
            color: #4D7CFF;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }

<body>
    <div class="container">
        <h1>PHRASEON</h1>
        <div class="tagline">Constraint-Driven Composition</div>
